name: Stale issues and PRs

# Politely closes issues and PRs that have gone quiet, so the backlog reflects real work.
on:
  schedule:
    - cron: "0 3 * * 1" # Mondays, 03:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: >
            This issue has been quiet for 60 days. If it's still relevant, leave a comment and we'll keep
            it open - otherwise it will close in 14 days.
          stale-pr-message: >
            This pull request has been quiet for 60 days. Comment to keep it open, or it will close in
            14 days. See CONTRIBUTING.md if you need help finishing it.
          close-issue-message: >
            Closing after 74 days of inactivity. Comment to reopen - no hard feelings.
          close-pr-message: >
            Closing after 74 days of inactivity. Reopen any time.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security"
